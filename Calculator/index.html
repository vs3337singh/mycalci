<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <div class="container text-center">
        <h1>Calculator</h1>
        <input placeholder="Enter First Number" class="form-control" id="num1">
        <br>
        <input placeholder="Enter Second Number" class="form-control">
    </div>
    <br>
    <div class="container text-center">
  <div class="row">
    <div class="col">
      <button type="button" class="btn btn-primary" id="btn1" onclick="myadd()">Add</button>
    </div>
    <div class="col">
      <button type="button" class="btn btn-primary">Sub</button>
    </div>
    <div class="col">
      <button type="button" class="btn btn-primary" id="btn3">Mul</button>
    </div>
  
  <div class="col">
      <button type="button" class="btn btn-primary" id="btn4">Div</button>
    </div>
  </div>
  </div>

  <div class="container text-center" id="result">
    Result:
  </div>

</div>

<script>
  function myadd(){
    var x = document.getElementById('num1').value
    var y = document.getElementById('num2').value
    var z = x+y
    console.log(x)
    console.log(y)
    console.log(z)
  }

  </script>
</script>
</body>
</html>
